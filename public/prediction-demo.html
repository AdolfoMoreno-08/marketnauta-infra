<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Dashboard - Animación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gaugeStroke {
            from {
                stroke-dasharray: 0 314;
            }
            to {
                stroke-dasharray: 220.2 314;
            }
        }

        @keyframes gaugeStroke2 {
            from {
                stroke-dasharray: 0 314;
            }
            to {
                stroke-dasharray: 197.75 314;
            }
        }

        @keyframes gaugeStroke3 {
            from {
                stroke-dasharray: 0 314;
            }
            to {
                stroke-dasharray: 25.12 314;
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .gauge-1 circle:last-of-type {
            animation: gaugeStroke 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .gauge-2 circle:last-of-type {
            animation: gaugeStroke2 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .gauge-3 circle:last-of-type {
            animation: gaugeStroke3 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .gauge-number {
            animation: fadeInScale 0.6s ease-out 0.8s both;
        }

        .metric-card {
            animation: slideUp 0.4s ease-out forwards;
        }

        .metric-card:nth-child(1) {
            animation-delay: 1.2s;
        }

        .metric-card:nth-child(2) {
            animation-delay: 1.3s;
        }

        .metric-card:nth-child(3) {
            animation-delay: 1.4s;
        }

        .pulse-indicator {
            animation: pulse 2s infinite;
        }

        .gauge-bg {
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.1));
        }
    </style>
</head>
<body class="bg-slate-950">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-4xl">
            <!-- Dashboard Card -->
            <div class="glass-card rounded-[2rem] border border-white/10 bg-gradient-to-b from-slate-900/90 to-slate-950/90 overflow-hidden shadow-2xl">

                <!-- Header -->
                <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-white/[0.02]">
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1.5">
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-cyan-400 pulse-indicator"></div>
                        </div>
                        <span class="ml-2 text-[10px] text-slate-500 font-mono uppercase tracking-widest">
                            ML_Prediction_Engine.v2
                        </span>
                    </div>
                    <div class="px-3 py-1.5 rounded bg-emerald-500/10 border border-emerald-500/30">
                        <span class="text-emerald-400 font-mono text-[10px] font-bold">✓ 87.4% accuracy</span>
                    </div>
                </div>

                <!-- Content -->
                <div class="p-8">
                    <!-- Gauges Row -->
                    <div class="grid grid-cols-3 gap-12 mb-12">
                        <!-- Gauge 1: Recompra -->
                        <div class="flex flex-col items-center">
                            <div class="relative w-[120px] h-[120px] mb-4">
                                <svg class="gauge-1" width="120" height="120" viewBox="0 0 120 120">
                                    <defs>
                                        <linearGradient id="gauge-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stopColor="#00E5FF" />
                                            <stop offset="100%" stopColor="#0077FF" />
                                        </linearGradient>
                                    </defs>
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gauge-grad-1)" stroke-width="8" stroke-linecap="round" style="transform-origin: 60px 60px; transform: rotate(-90deg);" />
                                </svg>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <span class="text-2xl font-bold text-cyan-400 font-mono gauge-number">91%</span>
                                </div>
                            </div>
                            <p class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">Recompra</p>
                        </div>

                        <!-- Gauge 2: Neutro -->
                        <div class="flex flex-col items-center">
                            <div class="relative w-[120px] h-[120px] mb-4">
                                <svg class="gauge-2" width="120" height="120" viewBox="0 0 120 120">
                                    <defs>
                                        <linearGradient id="gauge-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stopColor="#00E5FF" />
                                            <stop offset="100%" stopColor="#0077FF" />
                                        </linearGradient>
                                    </defs>
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gauge-grad-2)" stroke-width="8" stroke-linecap="round" style="transform-origin: 60px 60px; transform: rotate(-90deg);" />
                                </svg>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <span class="text-2xl font-bold text-cyan-400 font-mono gauge-number">63%</span>
                                </div>
                            </div>
                            <p class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">Neutro</p>
                        </div>

                        <!-- Gauge 3: Churn -->
                        <div class="flex flex-col items-center">
                            <div class="relative w-[120px] h-[120px] mb-4">
                                <svg class="gauge-3" width="120" height="120" viewBox="0 0 120 120">
                                    <defs>
                                        <linearGradient id="gauge-grad-3" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stopColor="#00E5FF" />
                                            <stop offset="100%" stopColor="#0077FF" />
                                        </linearGradient>
                                    </defs>
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gauge-grad-3)" stroke-width="8" stroke-linecap="round" style="transform-origin: 60px 60px; transform: rotate(-90deg);" />
                                </svg>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <span class="text-2xl font-bold text-cyan-400 font-mono gauge-number">8%</span>
                                </div>
                            </div>
                            <p class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">Churn</p>
                        </div>
                    </div>

                    <!-- Timeline Section -->
                    <div class="mb-6">
                        <p class="text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-4">
                            Evolución temporal — últimas 6 semanas
                        </p>
                        <div class="h-[200px] bg-white/[0.01] border border-white/5 rounded-lg p-4 flex items-end justify-around gap-2">
                            <div class="w-12 bg-gradient-to-t from-cyan-500 to-cyan-300 rounded h-24" style="animation: slideUp 0.6s ease-out 0.2s both;"></div>
                            <div class="w-12 bg-gradient-to-t from-cyan-500 to-cyan-300 rounded h-28" style="animation: slideUp 0.6s ease-out 0.3s both;"></div>
                            <div class="w-12 bg-gradient-to-t from-cyan-500 to-cyan-300 rounded h-32" style="animation: slideUp 0.6s ease-out 0.4s both;"></div>
                            <div class="w-12 bg-gradient-to-t from-cyan-500 to-cyan-300 rounded h-36" style="animation: slideUp 0.6s ease-out 0.5s both;"></div>
                            <div class="w-12 bg-gradient-to-t from-cyan-500 to-cyan-300 rounded h-40" style="animation: slideUp 0.6s ease-out 0.6s both;"></div>
                            <div class="w-12 bg-gradient-to-t from-cyan-500 to-cyan-300 rounded h-44" style="animation: slideUp 0.6s ease-out 0.7s both;"></div>
                        </div>
                    </div>

                    <!-- Metrics Grid -->
                    <div class="grid grid-cols-3 gap-3">
                        <div class="metric-card p-4 rounded-xl bg-cyan-400/5 border border-cyan-400/20 text-center hover:scale-105 transition-transform cursor-pointer">
                            <p class="text-sm font-bold font-mono text-cyan-400">RECOMPRA</p>
                            <p class="text-[8px] font-mono text-slate-600 uppercase tracking-widest mt-1">Señal alta</p>
                        </div>
                        <div class="metric-card p-4 rounded-xl bg-slate-400/5 border border-slate-400/20 text-center hover:scale-105 transition-transform cursor-pointer">
                            <p class="text-sm font-bold font-mono text-slate-400">NEUTRO</p>
                            <p class="text-[8px] font-mono text-slate-600 uppercase tracking-widest mt-1">Señal media</p>
                        </div>
                        <div class="metric-card p-4 rounded-xl bg-red-400/5 border border-red-400/20 text-center hover:scale-105 transition-transform cursor-pointer">
                            <p class="text-sm font-bold font-mono text-red-400">CHURN</p>
                            <p class="text-[8px] font-mono text-slate-600 uppercase tracking-widest mt-1">Señal de fuga</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-8 text-slate-500 text-sm">
                <p>📊 Animación sincronizada - Las transiciones se ejecutan automáticamente al cargar</p>
            </div>
        </div>
    </div>

    <style>
        .glass-card {
            backdrop-filter: blur(10px);
        }
    </style>
</body>
</html>
