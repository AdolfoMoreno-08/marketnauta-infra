<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-nyc { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: bold; fill: #2D5016; letter-spacing: 1px; }
    .text-nyc-sub { font-family: 'Arial', sans-serif; font-size: 8px; fill: #4A7C2C; letter-spacing: 2px; }
  </style>
  <!-- Minimalist logo: N + C with corner bracket -->
  <g opacity="0.9">
    <path d="M 70 60 L 70 130 M 70 60 L 85 130 M 100 60 L 85 130" stroke="#2D5016" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="110" cy="100" r="25" fill="none" stroke="#2D5016" stroke-width="2" opacity="0.6"/>

    <!-- Corner bracket -->
    <path d="M 55 45 L 55 60 L 70 60 M 145 140 L 145 155 L 130 155" stroke="#2D5016" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <text x="100" y="175" class="text-nyc" text-anchor="middle">NYC</text>
  <text x="100" y="190" class="text-nyc-sub" text-anchor="middle">CONSULTORÍA</text>
</svg>