<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-flor { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: white; letter-spacing: 2px; }
  </style>
  <!-- Center cross with colorful gradient -->
  <g opacity="0.9">
    <!-- Rainbow bands -->
    <rect x="60" y="60" width="15" height="80" fill="#FF6B6B" transform="rotate(45 67.5 100)"/>
    <rect x="60" y="60" width="15" height="80" fill="#FFA500" transform="rotate(0 100 100)"/>
    <rect x="60" y="60" width="15" height="80" fill="#4169E1" transform="rotate(45 132.5 100)"/>
  </g>

  <!-- Leaves and flowers scattered -->
  <circle cx="70" cy="60" r="6" fill="#2ECC71" opacity="0.8"/>
  <circle cx="130" cy="60" r="6" fill="#2ECC71" opacity="0.8"/>
  <circle cx="100" cy="30" r="4" fill="white" opacity="0.9"/>
  <circle cx="100" cy="170" r="4" fill="white" opacity="0.9"/>

  <text x="100" y="190" class="text-flor" text-anchor="middle">FLOR DE ALTURA</text>
</svg>