<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-inkas { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: bold; fill: white; letter-spacing: 1px; }
  </style>
  <!-- Circular symbol -->
  <circle cx="100" cy="80" r="45" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="80" r="35" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Center Inca symbol -->
  <g opacity="0.8">
    <path d="M 100 50 L 110 65 L 105 75 Q 100 78 95 75 L 90 65 Z" fill="white"/>
    <circle cx="100" cy="80" r="8" fill="white" opacity="0.6"/>
    <rect x="85" y="95" width="30" height="3" fill="white" opacity="0.4"/>
  </g>

  <text x="100" y="160" class="text-inkas" text-anchor="middle">LOS INKAS</text>
  <text x="100" y="180" style="font-size: 9px; fill: #999; text-anchor: middle; letter-spacing: 1px;">PROCESADOR</text>
</svg>